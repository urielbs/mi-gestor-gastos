<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Editar Categoría</title>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-lg mx-auto bg-white p-8 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-blue-800">Editar Categoría: {{ category.name }}</h1>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">Nombre de la Categoría</label>
                {{ form.name }}
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Presupuesto Mensual</label>
                {{ form.monthly_budget }}
            </div>
            
            <div class="flex gap-4">
                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded font-bold hover:bg-blue-700">
                    Guardar Cambios
                </button>
                <a href="{% url 'manage_categories' %}" class="bg-gray-500 text-white px-6 py-2 rounded font-bold hover:bg-gray-600">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</body>
</html>
