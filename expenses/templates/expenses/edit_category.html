<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Editar Categoría | WalletControl</title>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full">
        <div class="bg-white p-10 rounded-3xl shadow-xl shadow-blue-100/50 border border-slate-100">
            
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-2xl mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-900">Editar Categoría</h1>
                <p class="text-slate-500 text-sm mt-2 leading-relaxed">
                    Ajusta los detalles de <strong>{{ category.name }}</strong> para mantener tu presupuesto bajo control.
                </p>
            </div>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Nombre de la Categoría</label>
                    <div class="relative">
                        {{ form.name }}
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Presupuesto Mensual</label>
                    <div class="relative">
                        {{ form.monthly_budget }}
                    </div>
                </div>

                <div class="flex flex-col gap-3 pt-4">
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 transition-all transform active:scale-95">
                        Guardar Cambios
                    </button>
                    <a href="{% url 'manage_categories' %}" class="w-full bg-slate-50 hover:bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold text-center transition-all">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
        
        <p class="text-center text-slate-400 text-xs mt-8">
            WalletControl © 2026 - Gestión inteligente de gastos
        </p>
    </div>
</body>
</html>
