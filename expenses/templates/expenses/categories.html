<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gestionar Categorías</title>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-blue-800">Tus Categorías</h1>
            <a href="{% url 'dashboard' %}" class="bg-gray-500 text-white px-4 py-2 rounded">Volver al Dashboard</a>
        </div>

        <div class="bg-white p-6 rounded-lg shadow mb-8">
            <h2 class="font-bold mb-4">Nueva Categoría</h2>
            <form method="POST" class="flex gap-4">
                {% csrf_token %}
                {{ form.name }}
                {{ form.monthly_budget }}
                <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded">Agregar</button>
            </form>
        </div>

        <div class="bg-white rounded-lg shadow overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="p-4">Nombre</th>
                        <th class="p-4">Presupuesto</th>
                        <th class="p-4 text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cat in categories %}
                    <tr class="border-t">
                        <td class="p-4">{{ cat.name }}</td>
                        <td class="p-4">${{ cat.monthly_budget }}</td>
                        <td class="p-4 flex justify-center gap-2">
                            <a href="{% url 'edit_category' cat.pk %}" class="text-blue-600 font-bold">Editar</a>
                            <form action="{% url 'delete_category' cat.pk %}" method="POST" onsubmit="return confirm('¿Borrar categoría? Se perderán sus vínculos.')">
                                {% csrf_token %}
                                <button type="submit" class="text-red-600 font-bold">Eliminar</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
