<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Registro Financiero | Gestor de Gastos</title>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Estilizado para los párrafos de ayuda de Django */
        .helptext { display: block; font-size: 0.75rem; color: #64748b; margin-top: 0.25rem; line-height: 1rem; }
        form p { margin-bottom: 1.25rem; }
        input { width: 100%; padding: 0.75rem 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; outline: none; transition: all 0.2s; }
        input:focus { border-color: #10b981; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen py-12">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-600 rounded-2xl shadow-lg mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900">Bienvenido</h1>
            <p class="text-slate-500 mt-2">Inicia tu camino al ahorro hoy</p>
        </div>

        <div class="bg-white p-10 rounded-3xl shadow-xl shadow-emerald-100/50 border border-slate-100">
            <h2 class="text-xl font-semibold text-slate-800 mb-6 text-center">Registro de Usuario</h2>
            
            <form method="post">
                {% csrf_token %}
                <div class="text-slate-700 text-sm font-medium">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Correo Electrónico</label>
                        {{ form.username }}
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                        <div class="relative">
                            {{ form.password1 }}
                            <button type="button" onclick="togglePassword('id_password1', this)" 
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-emerald-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="mb-6">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Confirmar Contraseña</label>
                        <div class="relative">
                            {{ form.password2 }}
                            <button type="button" onclick="togglePassword('id_password2', this)" 
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-emerald-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-xl font-bold shadow-lg shadow-emerald-200 mt-4 transition-all transform hover:-translate-y-0.5 active:scale-[0.98]">
                    Crear mi Cartera Virtual
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-50 text-center">
                <p class="text-slate-500 text-sm">
                    ¿Ya tienes cuenta activa? 
                    <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:text-blue-700 ml-1">Inicia sesión</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
<script>
function togglePassword(inputId, button) {
    const input = document.getElementById(inputId);
    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
    input.setAttribute('type', type);
    
    // Cambiar la opacidad del ícono para dar feedback visual
    if (type === 'text') {
        button.classList.add('text-blue-600', 'text-emerald-600'); // Dependiendo de la página
        button.classList.remove('text-slate-400');
    } else {
        button.classList.remove('text-blue-600', 'text-emerald-600');
        button.classList.add('text-slate-400');
    }
}
</script>
