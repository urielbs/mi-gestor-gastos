<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Ingreso Seguro | Gestor de Gastos</title>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="max-w-md w-full mx-4">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 1.343-3 3s1.343 3 3 3 3-1.343 3-3-1.343-3-3-3zM12 8V7m0 1v1m0 5v1m0-1v-1m-7 0h1m7-7h1M5 12a7 7 0 1114 0 7 7 0 01-14 0z" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-900">WalletControl</h1>
            <p class="text-slate-500 mt-2">Gestión financiera inteligente</p>
        </div>

        <div class="bg-white p-10 rounded-3xl shadow-xl shadow-blue-100/50 border border-slate-100">
            <h2 class="text-xl font-semibold text-slate-800 mb-6 text-center">Inicia Sesión</h2>
            
            <form method="post" class="space-y-5">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Correo Electronico</label>
                    <input type="text" name="username" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" placeholder="Ingresa tu usuario">
                </div>
                
                <div class="relative">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Contraseña</label>
                    <div class="relative">
                        <input type="password" name="password" id="id_password" required 
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none" 
                            placeholder="••••••••">
                        
                        <button type="button" onclick="togglePassword('id_password', this)" 
                                class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-blue-600 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="eye-icon">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-0.5 active:scale-[0.98]">
                    Acceder al Panel
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-slate-50 text-center">
                <p class="text-slate-500 text-sm">
                    ¿Nuevo en la plataforma? 
                    <a href="{% url 'register' %}" class="text-blue-600 font-bold hover:text-blue-700 ml-1">Crea una cuenta</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
<script>
function togglePassword(inputId, button) {
    const input = document.getElementById(inputId);
    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
    input.setAttribute('type', type);
    
    // Cambiar la opacidad del ícono para dar feedback visual
    if (type === 'text') {
        button.classList.add('text-blue-600', 'text-emerald-600'); // Dependiendo de la página
        button.classList.remove('text-slate-400');
    } else {
        button.classList.remove('text-blue-600', 'text-emerald-600');
        button.classList.add('text-slate-400');
    }
}
</script>
